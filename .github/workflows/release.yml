name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Publish Release
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    permissions:
      contents: write       # tag and push release commit
      issues: write         # comment on issues resolved by release
      pull-requests: write  # comment on PRs resolved by release
      id-token: write       # NPM provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0    # semantic-release needs full history to calculate version

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false
          registry-url: https://registry.npmjs.org
          always-auth: true

      - name: Install pnpm
        run: |
          npm install -g pnpm@10.32.1
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Release
        if: ${{ env.NPM_TOKEN != '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm exec semantic-release

      - name: Skip publish (missing NPM_TOKEN)
        if: ${{ env.NPM_TOKEN == '' }}
        run: echo "::warning::NPM_TOKEN secret is not configured. Skipping release."

