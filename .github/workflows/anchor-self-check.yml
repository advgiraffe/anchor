name: Anchor self-check
on:
  push:
    branches: [main]
    paths: ['spec/**']

jobs:
  self-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

